<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Investor Login — Douro Partners</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary:      #4A6B8A;
      --primary-dark: #3A5570;
      --secondary:    #3D6430;
      --bg:           #F7F3EC;
      --text:         #2C2C2C;
      --text-light:   #6B7280;
      --border:       #D8D3C8;
      --white:        #FFFFFF;
      --font-serif:   'Playfair Display', Georgia, serif;
      --font-sans:    'Inter', 'Helvetica Neue', sans-serif;
      --radius:       8px;
      --shadow:       0 4px 24px rgba(30, 42, 56, 0.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--text);
    }
    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    .logo { height: 64px; margin: 0 auto 32px; }
    h1 {
      font-family: var(--font-serif);
      font-size: 1.75rem;
      color: var(--primary);
      margin-bottom: 8px;
    }
    .subtitle {
      color: var(--text-light);
      font-size: 0.9rem;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .form-group { margin-bottom: 16px; text-align: left; }
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text);
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--font-sans);
      font-size: 0.95rem;
      color: var(--text);
      background: var(--white);
      transition: 0.3s ease;
    }
    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(74, 107, 138, 0.12);
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-sans);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s ease;
      margin-top: 8px;
    }
    .btn:hover  { background: var(--primary-dark); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .message {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: var(--radius);
      font-size: 0.9rem;
      display: none;
      text-align: left;
      line-height: 1.5;
    }
    .message--success { background: #EBF5EB; color: var(--secondary); border: 1px solid #C3E0C3; }
    .message--error   { background: #FBE9E9; color: #B33A3A;          border: 1px solid #F0C0C0; }
    .message--info    { background: #EBF3FA; color: var(--primary);   border: 1px solid #C3D8EA; }
    .back { margin-top: 28px; }
    .back a { font-size: 0.85rem; color: var(--text-light); text-decoration: none; }
    .back a:hover { color: var(--primary); }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <img src="../assets/logo.png" alt="Douro Partners" class="logo">

    <!-- Default view: send magic link -->
    <div id="formView">
      <h1>Investor Access</h1>
      <p class="subtitle">Enter your email address and we'll send you a secure, one-time sign-in link.</p>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="your@email.com" required autocomplete="email">
        </div>
        <button type="submit" class="btn" id="submitBtn">Send sign-in link</button>
      </form>
      <div id="successMsg" class="message message--success"></div>
      <div id="errorMsg"   class="message message--error"></div>
    </div>

    <!-- Processing view: completing magic link sign-in -->
    <div id="processingView" style="display:none;">
      <h1>Signing you in…</h1>
      <p class="subtitle">Please wait while we verify your link.</p>
      <div id="processMsg" class="message message--info" style="display:block;">
        Verifying…
      </div>
    </div>

    <div class="back"><a href="/">← Back to Douro Partners</a></div>
  </div>

  <script type="module">
    import { auth } from './firebase-config.js';
    import {
      sendSignInLinkToEmail,
      isSignInWithEmailLink,
      signInWithEmailLink,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

    const INVESTOR_URL  = window.location.origin + '/portal/investor.html';
    const LOGIN_URL     = window.location.origin + '/portal/login.html';

    // If already signed in, redirect immediately
    onAuthStateChanged(auth, (user) => {
      if (user && !isSignInWithEmailLink(auth, window.location.href)) {
        window.location.href = INVESTOR_URL;
      }
    });

    // Handle magic link callback
    if (isSignInWithEmailLink(auth, window.location.href)) {
      document.getElementById('formView').style.display      = 'none';
      document.getElementById('processingView').style.display = 'block';

      let email = window.localStorage.getItem('emailForSignIn');
      if (!email) {
        email = window.prompt('Please re-enter your email address to complete sign-in:');
      }

      if (email) {
        signInWithEmailLink(auth, email, window.location.href)
          .then(() => {
            window.localStorage.removeItem('emailForSignIn');
            window.location.href = INVESTOR_URL;
          })
          .catch(err => {
            const msg = document.getElementById('processMsg');
            msg.className      = 'message message--error';
            msg.style.display  = 'block';
            msg.textContent    = 'Sign-in failed: ' + (err.message || 'Invalid or expired link. Please request a new one.');
            document.getElementById('processingView').style.display = 'none';
            document.getElementById('formView').style.display       = 'block';
          });
      } else {
        document.getElementById('processingView').style.display = 'none';
        document.getElementById('formView').style.display       = 'block';
      }
    }

    // Send magic link
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email      = document.getElementById('email').value.trim();
      const btn        = document.getElementById('submitBtn');
      const successMsg = document.getElementById('successMsg');
      const errorMsg   = document.getElementById('errorMsg');

      btn.disabled     = true;
      btn.innerHTML    = '<span class="spinner"></span> Sending…';
      successMsg.style.display = 'none';
      errorMsg.style.display   = 'none';

      const actionCodeSettings = {
        url: LOGIN_URL,
        handleCodeInApp: true
      };

      try {
        await sendSignInLinkToEmail(auth, email, actionCodeSettings);
        window.localStorage.setItem('emailForSignIn', email);
        successMsg.textContent  = '✓ Link sent! Check your inbox and click the sign-in link. You can close this tab.';
        successMsg.style.display = 'block';
        document.getElementById('loginForm').reset();
      } catch (err) {
        errorMsg.textContent  = err.message || 'Something went wrong. Please try again.';
        errorMsg.style.display = 'block';
      } finally {
        btn.disabled  = false;
        btn.innerHTML = 'Send sign-in link';
      }
    });
  </script>
</body>
</html>
