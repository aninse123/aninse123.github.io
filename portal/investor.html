<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Investor Portal — Douro Partners</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="apple-touch-icon" href="/assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary:      #4A6B8A;
      --primary-dark: #3A5570;
      --secondary:    #3D6430;
      --bg:           #F7F3EC;
      --bg-dark:      #1E2A38;
      --text:         #2C2C2C;
      --text-light:   #6B7280;
      --border:       #D8D3C8;
      --white:        #FFFFFF;
      --font-serif:   'Playfair Display', Georgia, serif;
      --font-sans:    'Inter', sans-serif;
      --radius:       8px;
      --shadow:       0 4px 24px rgba(30,42,56,0.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-sans); background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Loading */
    #loadingScreen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Admin bar */
    .admin-bar {
      background: var(--bg-dark);
      color: rgba(255,255,255,0.7);
      text-align: center;
      padding: 10px 24px;
      font-size: 0.82rem;
    }
    .admin-bar a { color: rgba(255,255,255,0.95); font-weight: 600; text-decoration: underline; }

    /* Nav */
    .nav {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 16px 0;
    }
    .nav__inner {
      max-width: 1000px; margin: 0 auto; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav__logo { height: 65px; }
    .nav__right { display: flex; align-items: center; gap: 16px; }
    .nav__main-link { font-size: 0.82rem; color: var(--text-light); text-decoration: none; transition: color 0.2s; }
    .nav__main-link:hover { color: var(--primary); }
    .nav__email { font-size: 0.82rem; color: var(--text-light); }
    .sign-out-btn {
      font-size: 0.82rem; font-weight: 600;
      color: var(--text-light);
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 14px;
      cursor: pointer;
      transition: 0.2s;
    }
    .sign-out-btn:hover { color: var(--primary); border-color: var(--primary); }

    /* Main content */
    .main { max-width: 1000px; margin: 0 auto; padding: 48px 24px; }
    .page-header { margin-bottom: 32px; }
    .page-title {
      font-family: var(--font-serif);
      font-size: 2rem;
      color: var(--primary);
      margin-bottom: 8px;
    }
    .page-subtitle { color: var(--text-light); font-size: 0.95rem; }

    /* Category filters */
    .filter-bar {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-bottom: 28px;
    }
    .filter-pill {
      padding: 6px 16px;
      border-radius: 100px;
      font-size: 0.8rem; font-weight: 600;
      border: 1.5px solid var(--border);
      background: var(--white);
      color: var(--text-light);
      cursor: pointer;
      transition: 0.2s;
    }
    .filter-pill:hover { border-color: var(--primary); color: var(--primary); }
    .filter-pill.active { background: var(--primary); color: var(--white); border-color: var(--primary); }

    /* Documents grid */
    .docs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .doc-card {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: 0.2s;
    }
    .doc-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
    .doc-icon { font-size: 2rem; line-height: 1; }
    .doc-category {
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--secondary);
    }
    .doc-name {
      font-family: var(--font-serif);
      font-size: 1.1rem;
      color: var(--bg-dark);
    }
    .doc-description {
      font-size: 0.85rem;
      color: var(--text-light);
      line-height: 1.6;
      flex: 1;
    }
    .doc-date { font-size: 0.75rem; color: var(--text-light); }
    .doc-download {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--primary);
      color: var(--white);
      padding: 10px 20px;
      border-radius: var(--radius);
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      transition: 0.2s;
      align-self: flex-start;
      margin-top: 6px;
    }
    .doc-download:hover { background: var(--primary-dark); }

    /* Empty state */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 24px;
      color: var(--text-light);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
    .empty-state p { font-size: 0.95rem; line-height: 1.8; max-width: 480px; margin: 0 auto; }

    /* Stage bar */
    .stage-bar {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 32px;
    }
    .stage-bar__label {
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-light); margin-bottom: 14px;
    }
    .stage-bar__track { display: flex; gap: 6px; align-items: flex-start; }
    .stage-pill { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .stage-pill__bar { width: 100%; height: 8px; border-radius: 100px; }
    .stage-pill__bar--done     { background: var(--primary); }
    .stage-pill__bar--current  { background: var(--primary); animation: stagePulse 1.5s ease-in-out infinite; }
    .stage-pill__bar--upcoming { background: transparent; border: 2px solid var(--border); box-sizing: border-box; }
    .stage-pill__name { font-size: 0.68rem; color: var(--text-light); text-align: center; line-height: 1.3; }
    .stage-pill__name--current { color: var(--primary); font-weight: 600; }
    @keyframes stagePulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

    /* Welcome message card */
    .welcome-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-left: 4px solid var(--primary);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 28px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .welcome-card__icon { font-size: 1.4rem; flex-shrink: 0; margin-top: 2px; }
    .welcome-card__body { flex: 1; }
    .welcome-card__title {
      font-family: var(--font-serif);
      font-size: 1.05rem;
      color: var(--primary);
      margin-bottom: 6px;
    }
    .welcome-card__message { font-size: 0.92rem; color: var(--text); line-height: 1.75; white-space: pre-line; }
    .welcome-card__date { font-size: 0.75rem; color: var(--text-light); margin-top: 10px; }

    @media (max-width: 600px) {
      .nav__email { display: none; }
      .main { padding: 32px 16px; }
      .doc-card { padding: 20px 16px; }
      .stage-pill__name { font-size: 0.6rem; }
    }
  </style>
</head>
<body>

  <div id="loadingScreen"><div class="spinner"></div></div>

  <div id="app" style="display:none;">

    <div id="adminBar" class="admin-bar" style="display:none;">
      You are signed in as an admin —
      <a href="/portal/admin.html">Go to Admin Panel →</a>
    </div>

    <nav class="nav">
      <div class="nav__inner">
        <a href="/"><img src="../assets/logo.png" alt="Douro Partners" class="nav__logo"></a>
        <div class="nav__right">
          <a href="/" class="nav__main-link">← Main site</a>
          <span class="nav__email" id="userEmail"></span>
          <button class="sign-out-btn" id="signOutBtn">Sign out</button>
        </div>
      </div>
    </nav>

    <main class="main">
      <div class="page-header">
        <h1 class="page-title">Investor Portal</h1>
        <p class="page-subtitle" id="pageSubtitle">Loading your documents…</p>
      </div>
      <div id="stageBar" class="stage-bar" style="display:none;">
        <div class="stage-bar__label">Fund Stage</div>
        <div class="stage-bar__track" id="stageTrack"></div>
      </div>
      <div id="messagesContainer"></div>
      <div id="filterBar" class="filter-bar" style="display:none;"></div>
      <div id="docsGrid" class="docs-grid"></div>
    </main>

  </div>

  <script type="module">
    import { auth, db, ADMIN_EMAILS } from './firebase-config.js';
    import {
      onAuthStateChanged, signOut
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    import {
      collection, query, where, orderBy, getDocs, doc, getDoc, addDoc, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    // ── Activity logging ───────────────────────────────────────
    async function logEvent(type, data = {}) {
      try {
        await addDoc(collection(db, 'activityLog'), {
          type, timestamp: serverTimestamp(), ...data
        });
      } catch (e) { /* fail silently */ }
    }

    const STAGES = [
      { id: 1, label: 'Raise' },
      { id: 2, label: 'Source & Evaluate' },
      { id: 3, label: 'Finance & Close' },
      { id: 4, label: 'Operate' },
      { id: 5, label: 'Exit' },
    ];

    function renderMessages(messages) {
      const container = document.getElementById('messagesContainer');
      const today     = new Date().toISOString().slice(0, 10);
      const visible   = messages.filter(m =>
        m.message && (!m.expiry || today <= m.expiry)
      );
      if (!visible.length) { container.innerHTML = ''; return; }

      container.innerHTML = visible.map(m => {
        const ts        = m.updatedAt || m.createdAt;
        const dateLabel = ts
          ? `— André & António  ·  ${new Date(ts.seconds * 1000).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' })}`
          : '— André & António';
        const titleHtml = m.title
          ? `<h3 class="welcome-card__title">${m.title}</h3>`
          : '';
        return `<div class="welcome-card" style="margin-bottom:16px;">
          <div class="welcome-card__icon">📢</div>
          <div class="welcome-card__body">
            ${titleHtml}
            <p class="welcome-card__message">${m.message}</p>
            <p class="welcome-card__date">${dateLabel}</p>
          </div>
        </div>`;
      }).join('');
    }

    function renderStageBar(currentStage) {
      const track = document.getElementById('stageTrack');
      track.innerHTML = STAGES.map(s => {
        let barClass = '', nameClass = '';
        if (s.id < currentStage)       { barClass = 'stage-pill__bar--done'; }
        else if (s.id === currentStage) { barClass = 'stage-pill__bar--current'; nameClass = 'stage-pill__name--current'; }
        else                            { barClass = 'stage-pill__bar--upcoming'; }
        return `<div class="stage-pill">
          <div class="stage-pill__bar ${barClass}"></div>
          <span class="stage-pill__name ${nameClass}">${s.label}</span>
        </div>`;
      }).join('');
      document.getElementById('stageBar').style.display = 'block';
    }

    const CATEGORY_ICONS = {
      PPM: '📋', Financials: '📊', Legal: '⚖️',
      Presentation: '📑', Other: '📄'
    };

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = '/portal/login.html';
        return;
      }

      const email = user.email;
      document.getElementById('userEmail').textContent = email;
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';

      // Detect fresh magic-link login vs. returning session
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('login') === '1') {
        window.history.replaceState({}, '', window.location.pathname);
        logEvent('login', { email });
      } else {
        logEvent('portal_visit', { email });
      }

      if (ADMIN_EMAILS.includes(email)) {
        document.getElementById('adminBar').style.display = 'block';
      }

      try {
        const q = query(
          collection(db, 'documents'),
          where('allowedEmails', 'array-contains', email)
        );

        // Fetch docs, stage config, and messages in parallel
        const messagesQ = query(collection(db, 'portalMessages'), orderBy('createdAt', 'desc'));
        const [snapshot, configSnap, messagesSnap] = await Promise.all([
          getDocs(q),
          getDoc(doc(db, 'config', 'portal')),
          getDocs(messagesQ),
        ]);

        // Render stage bar (always visible, regardless of documents)
        const cfg          = configSnap.exists() ? configSnap.data() : {};
        const currentStage = cfg.currentStage || 1;
        renderStageBar(currentStage);

        const messages = [];
        messagesSnap.forEach(d => messages.push({ id: d.id, ...d.data() }));
        renderMessages(messages);

        const grid     = document.getElementById('docsGrid');
        const subtitle = document.getElementById('pageSubtitle');

        if (snapshot.empty) {
          subtitle.textContent = '';
          grid.innerHTML = `
            <div class="empty-state">
              <div class="icon">📬</div>
              <p><strong>Welcome to your Investor Portal.</strong><br><br>
                 Your documents will appear here as Douro Partners shares them with you.<br><br>
                 If you are expecting access to a specific document, feel free to reach out at
                 <a href="mailto:andre.rocha@douropartners.pt" style="color:var(--primary);">andre.rocha@douropartners.pt</a>
                 or <a href="mailto:antonio.carvalho@douropartners.pt" style="color:var(--primary);">antonio.carvalho@douropartners.pt</a>.</p>
            </div>`;
          return;
        }

        const docs = [];
        snapshot.forEach(d => docs.push({ id: d.id, ...d.data() }));
        docs.sort((a, b) => (b.addedAt?.seconds || 0) - (a.addedAt?.seconds || 0));

        subtitle.textContent = `${docs.length} document${docs.length !== 1 ? 's' : ''} shared with you`;

        // Category filter pills — only show if more than one category exists
        const categories = [...new Set(docs.map(d => d.category).filter(Boolean))];
        const filterBar  = document.getElementById('filterBar');

        function renderCards(filter) {
          filterBar.querySelectorAll('.filter-pill').forEach(p =>
            p.classList.toggle('active', p.dataset.cat === filter)
          );
          const filtered = filter === 'All' ? docs : docs.filter(d => d.category === filter);
          grid.innerHTML = '';
          filtered.forEach(d => {
            const icon = CATEGORY_ICONS[d.category] || '📄';
            const date = d.addedAt
              ? new Date(d.addedAt.seconds * 1000).toLocaleDateString('en-GB', {
                  day: 'numeric', month: 'long', year: 'numeric'
                })
              : '';
            const card = document.createElement('div');
            card.className = 'doc-card';
            card.innerHTML = `
              <div class="doc-icon">${icon}</div>
              <div class="doc-category">${d.category || 'Document'}</div>
              <div class="doc-name">${d.name}</div>
              ${d.description ? `<div class="doc-description">${d.description}</div>` : ''}
              ${date ? `<div class="doc-date">Added ${date}</div>` : ''}
              <a href="${d.downloadURL}" class="doc-download" target="_blank">
                ↓ &nbsp;Download PDF
              </a>
            `;
            card.querySelector('.doc-download').addEventListener('click', () => {
              logEvent('doc_downloaded', { email, docId: d.id, docName: d.name, category: d.category });
            });
            grid.appendChild(card);
          });
        }

        if (categories.length > 1) {
          filterBar.style.display = 'flex';
          ['All', ...categories].forEach(cat => {
            const pill = document.createElement('button');
            pill.className = 'filter-pill' + (cat === 'All' ? ' active' : '');
            pill.textContent = cat;
            pill.dataset.cat = cat;
            pill.addEventListener('click', () => renderCards(cat));
            filterBar.appendChild(pill);
          });
        }

        renderCards('All');

      } catch (err) {
        document.getElementById('pageSubtitle').textContent =
          'Error loading documents. Please refresh or contact support.';
        console.error(err);
      }
    });

    document.getElementById('signOutBtn').addEventListener('click', async () => {
      const email = auth.currentUser?.email;
      if (email) await logEvent('logout', { email });
      await signOut(auth);
      window.location.href = '/portal/login.html';
    });
  </script>
</body>
</html>
