<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Douro Partners</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary:    #4A6B8A;
      --bg:         #F7F3EC;
      --text:       #2C2C2C;
      --text-light: #6B7280;
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-sans:  'Inter', 'Helvetica Neue', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      color: var(--text);
    }
    .container { max-width: 480px; }
    img.logo { height: 80px; margin: 0 auto 40px; }
    h1 {
      font-family: var(--font-serif);
      font-size: 5rem;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 16px;
      opacity: 0.25;
    }
    h2 {
      font-family: var(--font-serif);
      font-size: 1.75rem;
      color: var(--primary);
      margin-bottom: 12px;
    }
    p {
      color: var(--text-light);
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 40px;
    }
    a.btn {
      display: inline-block;
      padding: 14px 36px;
      background: var(--primary);
      color: #fff;
      border-radius: 8px;
      font-family: var(--font-sans);
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.3s ease;
    }
    a.btn:hover { background: #3A5570; }
  </style>
</head>
<body>
  <div class="container">
    <img src="/assets/logo.png" alt="Douro Partners" class="logo">
    <h1>404</h1>
    <h2>Page not found</h2>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="btn">Back to Douro Partners</a>
  </div>
</body>
</html>
